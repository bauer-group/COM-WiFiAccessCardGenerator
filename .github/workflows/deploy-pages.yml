# =============================================================================
# GitHub Pages Deployment
# =============================================================================
# Automatically builds and deploys the PWA to GitHub Pages.
#
# Triggers:
#   - Push to main branch
#   - Manual workflow dispatch
#
# Requirements:
#   - Repository Settings > Pages > Source: "GitHub Actions"
#
# Base URL Configuration:
#   The BASE_URL env var controls asset paths in the built app.
#
#   WITH custom domain (e.g. wifi-access-cards.app.bauer-group.com):
#     - Do NOT set BASE_URL (defaults to '/')
#     - Custom domain serves files from root
#     - Requires a CNAME file in the repo root or configured in GitHub Pages settings
#
#   WITHOUT custom domain (e.g. bauer-group.github.io/COM-WiFiAccessCardGenerator/):
#     - Set BASE_URL: '/COM-WiFiAccessCardGenerator/' in the build step env
#     - Assets will be prefixed with the repository subpath
#
#   Current setup: Custom domain → BASE_URL not set → '/'
# =============================================================================

name: 🌐 Deploy to GitHub Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Build
  # ---------------------------------------------------------------------------
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      # BASE_URL is not set here → defaults to '/' (custom domain serves from root).
      # To deploy WITHOUT a custom domain, uncomment the env block below:
      #   env:
      #     BASE_URL: '/COM-WiFiAccessCardGenerator/'
      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'

  # ---------------------------------------------------------------------------
  # Deploy
  # ---------------------------------------------------------------------------
  deploy:
    name: 🌐 Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
